<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT01 — Formulário de Contato Simples</title>
</head>
<body>

      <form action="https://httpbin.org/get" method="get">
        <fieldset>
          <legend>Informações pessoais</legend>
          <div>
            <label for="nome">* Nome: </label>
            <input type="text" name="nome" id="nome" placeholder="Ex: José Maria" autocomplete="nome" required minlength="3" maxlength="100">
          </div>
          <div>
            <label for="email">* E-mail: </label>
            <input type="email" name="email" id="email" placeholder="usuario@dominio.com" autocomplete="email" required maxlength="100">
          </div>
        </fieldset>

        <fieldset>
          <legend>Mensagem</legend>
          <div>
            <label for="assunto">* Assunto: </label>
            <input type="text" name="assunto" id="assunto" placeholder="Ex: requerimento de permuta" required maxlength="100">
          </div>
          <div>
            <label for="mensagem">* Mensagem: </label>
            <textarea name="mensagem" id="mensagem" rows="5" cols="80" placeholder="Escreva sua duvida com detalhes" maxlength="1000" required></textarea>
          </div>
        </fieldset>
        <p>* Campos obrigatórios</p>
        <button type="submit"> Enviar mensagem</button>
        
      </form>

    <p><a href="../index.html">← Voltar à página principal</a></p>
</body>
</html>

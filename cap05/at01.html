<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 05 — AT01 — Formulário de Contato Simples</title>
</head>
<body>
      <header>
        <h1>Formulário de Contato Simples</h1>
        <p><a href="../index.html">← Voltar à página principal</a></p>
        <small>* Campos obrigatórios</small>
      </header>
      <main>
        <form action="https://httpbin.org/get" method="get">
          <fieldset>
            <legend>Informações pessoais</legend>
            <div class="campo">
              <label for="nome">* Nome: </label>
              <input 
              type="text" 
              name="nome" 
              id="nome" 
              placeholder="Ex: José Maria" 
              autocomplete="nome" 
              required 
              minlength="3" 
              maxlength="100">
            </div>
            <div class="campo">
              <label for="email">* E-mail: </label>
              <input 
              type="email" 
              name="email" 
              id="email" 
              placeholder="usuario@dominio.com" 
              autocomplete="email" 
              required 
              maxlength="100">
            </div>
          </fieldset>
          <fieldset>
            <legend>Mensagem</legend>
            <div class="campo">
              <label for="assunto">* Assunto: </label>
              <input 
              type="text" 
              name="assunto" 
              id="assunto" 
              placeholder="Ex: requerimento de permuta" 
              required 
              maxlength="100">
            </div>
            <div class="campo">
              <label for="mensagem">* Mensagem: </label>
              <textarea 
              name="mensagem" 
              id="mensagem" 
              rows="5" cols="80" 
              placeholder="Escreva sua duvida com detalhes" maxlength="1000" 
              required></textarea>
            </div>
          </fieldset>
          <div class="acoes">
            <button type="submit"> Enviar mensagem</button>
          </div>
        </form>
      </main>
</body>
</html>
